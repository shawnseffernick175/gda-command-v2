<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.6;
    color: #28251D;
    background: #FFFFFF;
    padding: 40px 48px;
  }
  h1 { font-size: 22px; font-weight: 600; color: #01696F; margin-bottom: 4px; }
  h2 { font-size: 14px; font-weight: 600; color: #28251D; margin: 20px 0 8px; border-bottom: 1px solid #D4D1CA; padding-bottom: 4px; }
  .subtitle { font-size: 12px; color: #7A7974; margin-bottom: 16px; }
  .header-bar { border-top: 3px solid #01696F; padding-top: 16px; margin-bottom: 24px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-bottom: 20px; }
  .meta-item { display: flex; gap: 8px; }
  .meta-label { font-size: 10px; color: #7A7974; text-transform: uppercase; letter-spacing: 0.04em; min-width: 80px; }
  .meta-value { font-size: 11px; color: #28251D; }
  .theme-card {
    background: #F7F6F2;
    border: 1px solid #D4D1CA;
    border-left: 4px solid #01696F;
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .theme-number { font-size: 10px; font-weight: 600; color: #01696F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .theme-title { font-size: 14px; font-weight: 600; color: #28251D; margin-bottom: 8px; }
  .theme-body { margin-bottom: 8px; }
  .evidence-label { font-size: 10px; font-weight: 600; color: #7A7974; text-transform: uppercase; margin-top: 8px; margin-bottom: 4px; }
  .evidence-item { font-size: 10px; color: #28251D; padding-left: 12px; border-left: 2px solid #D4D1CA; margin-bottom: 4px; }
  .doctrine-tag { font-size: 10px; font-style: italic; color: #7A7974; margin-top: 8px; }
  .draft-warning {
    background: #FEF3C7;
    border: 1px solid #F59E0B;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    color: #92400E;
    margin-top: 8px;
  }
  .footnote { font-size: 9px; color: #7A7974; margin-top: 4px; }
  .footnote a { color: #01696F; text-decoration: underline; }
  .citations { margin-top: 24px; border-top: 1px solid #D4D1CA; padding-top: 12px; }
  .citations h2 { border-bottom: none; }
  .citation-item { font-size: 9px; color: #7A7974; margin-bottom: 4px; }
  .citation-item a { color: #01696F; }
  .footer { margin-top: 32px; border-top: 1px solid #D4D1CA; padding-top: 8px; font-size: 9px; color: #7A7974; text-align: center; }
</style>
</head>
<body>
  <div class="header-bar">
    <h1>{{title}}</h1>
    <p class="subtitle">Win Themes — Envision Innovative Solutions</p>
  </div>

  <div class="meta-grid">
    <div class="meta-item"><span class="meta-label">Agency</span><span class="meta-value">{{agency}}</span></div>
    <div class="meta-item"><span class="meta-label">Solicitation</span><span class="meta-value">{{solicitation_number}}</span></div>
    <div class="meta-item"><span class="meta-label">Value</span><span class="meta-value">{{value}}</span></div>
    <div class="meta-item"><span class="meta-label">Capture Stage</span><span class="meta-value">{{capture_stage}}</span></div>
  </div>

  {{themes_html}}

  <div class="citations">
    <h2>Sources</h2>
    {{citations_html}}
  </div>

  <div class="footer">
    Generated {{generated_at}} — Envision Innovative Solutions — CONFIDENTIAL
  </div>
</body>
</html>
