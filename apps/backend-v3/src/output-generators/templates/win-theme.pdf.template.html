<!--
  F-313: Win Theme PDF Template
  Hydra Teal (#01696F) + Inter font per aesthetics canonical.
  1-page theme deck per pursuit: 3-5 themes in AJ voice,
  backed by past performance + capability evidence.
  
  Themes without evidence labeled "draft — needs evidence".
  Themes without doctrine alignment flagged "needs doctrine alignment review".
  Color scheme: 6 review colors only (NO GOLD per F-539).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; color: #28251D; background: #FFFFFF; margin: 0; padding: 32px; max-width: 900px; margin: 0 auto; font-size: 15px; line-height: 24px; }
    h1 { color: #01696F; font-size: 20px; font-weight: 600; }
    h2 { color: #01696F; font-size: 16px; font-weight: 600; margin-top: 24px; }
    .meta { color: #7A7974; font-size: 12px; }
    .section { border: 1px solid #D4D1CA; border-radius: 4px; padding: 20px; margin-top: 16px; }
    .section-accent { border-left: 4px solid #01696F; }
    .badge { display: inline-block; background: #01696F15; color: #01696F; padding: 2px 8px; border-radius: 3px; font-size: 11px; }
    .badge-critical { background: #A12C7B15; color: #A12C7B; }
    a { color: #01696F; }
  </style>
</head>
<body>
  <h1>Win Theme Deck</h1>
  <p class="meta">Generated {{date}} | Georgetown Defense Analytics — Envision LLC</p>
  
  <div class="section">
    {{program_overview}}
  </div>
  
  {{themes}}
  
  <h2>Doctrine Alignment</h2>
  {{doctrine_alignment}}
  
  <div style="margin-top: 32px; padding-top: 12px; border-top: 1px solid #D4D1CA; color: #7A7974; font-size: 11px;">
    Generated by GDA Command — Output Generators (F-313) | Envision Innovative Solutions
  </div>
</body>
</html>
