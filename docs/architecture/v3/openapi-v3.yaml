openapi: 3.1.0
info:
  title: GDA Command V3 API
  version: 3.0.0-draft
  description: |
    V3 API contract for GDA Command — Envision-only, single-tenant.
    Every list endpoint returns R1 source siblings on every field.
    Every detail endpoint auto-runs R2 analysis.

    **Binding scope:** Envision-only. No `ou_tag` query params.
    Partners are lookup-only (not browsable).
  contact:
    name: GDA Engineering
    email: shawn@envision-is.com
  license:
    name: Proprietary
    identifier: LicenseRef-GDA-Proprietary

servers:
  - url: https://gda.csr-llc.tech/api/v3
    description: Production
  - url: http://localhost:3001/api/v3
    description: Local development

tags:
  - name: Opportunities
    description: Opportunity discovery, qualification, and grading
  - name: Pipeline
    description: Qualified pursuits with win probability tracking
  - name: Captures
    description: Proposal capture management and compliance
  - name: Action Items
    description: Task management with LLM draft generation
  - name: Launchpad
    description: Daily-driver summary and flags
  - name: Partners
    description: Partner facts for teaming context (lookup only)
  - name: Sources
    description: Source registry resolution for SourceBadge component
  - name: Fast Track
    description: Quick triage of opportunities with grade, rationale, and NAICS match
  - name: System
    description: Health, readiness, and version endpoints

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Opportunities
  # ---------------------------------------------------------------------------
  /opportunities:
    get:
      operationId: listOpportunities
      summary: List opportunities
      description: |
        Filterable, paginated list of opportunities.
        R1 source siblings are returned on every field.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OpportunityStatus'
        - name: agency
          in: query
          description: Case-insensitive substring match
          schema:
            type: string
        - name: naics
          in: query
          description: Case-insensitive substring match
          schema:
            type: string
        - name: grade
          in: query
          schema:
            $ref: '#/components/schemas/Grade'
        - name: due_before
          in: query
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          schema:
            type: string
            format: date
        - name: set_aside
          in: query
          schema:
            type: string
        - name: min_value
          in: query
          schema:
            type: number
        - name: max_value
          in: query
          schema:
            type: number
        - name: hot
          in: query
          description: "Grade A or win prob >= 70%"
          schema:
            type: string
            enum: ['1']
      responses:
        '200':
          description: Paginated list of opportunities with R1 sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityListResponse'
              example:
                success: true
                data:
                  items:
                    - id: "opp_001"
                      title: "Army RS3 Task Order 47"
                      title_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      agency: "Department of the Army"
                      agency_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      naics: "541330"
                      naics_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      grade: "A"
                      status: discovery
                      response_due_at: "2026-07-15T17:00:00.000Z"
                      value_min: 5000000
                      value_max: 15000000
                      created_at: "2026-05-20T00:00:00.000Z"
                      updated_at: "2026-05-29T10:00:00.000Z"
                  pagination:
                    limit: 50
                    cursor: "eyJpZCI6Im9wcF8wMDEifQ=="
                    hasMore: true
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_abc123
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createOpportunity
      summary: Create opportunity (manual entry)
      tags: [Opportunities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpportunityCreate'
            example:
              title: "USCG IT Modernization"
              source: manual
              agency: "United States Coast Guard"
              naics: "541512"
              description: "IT modernization support for USCG C5ISR systems"
              response_due_at: "2026-08-01T17:00:00.000Z"
              value_min: 2000000
              value_max: 8000000
      responses:
        '201':
          description: Created opportunity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  id: "opp_002"
                  title: "USCG IT Modernization"
                  source: manual
                  agency: "United States Coast Guard"
                  status: discovery
                  created_at: "2026-05-29T16:05:00.000Z"
                meta:
                  generatedAt: "2026-05-29T16:05:00.000Z"
                  source: v3
                  requestId: req_def456
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /opportunities/{id}:
    get:
      operationId: getOpportunity
      summary: Opportunity detail (auto-analyzes per R2)
      description: |
        Returns full opportunity detail with R1 source siblings on every field.
        Automatically triggers R2 analysis (pwin, incumbent, competitors,
        blackhat, wargame, timeline). No separate run-analysis endpoint exists.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Opportunity detail with R2 analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityDetailResponse'
              example:
                success: true
                data:
                  id: "opp_001"
                  title: "Army RS3 Task Order 47"
                  title_sources:
                    - kind: sam_gov
                      title: "SAM.gov Opportunity W52P1J-26-R-0047"
                      url: "https://sam.gov/opp/abc123/view"
                      retrieved_at: "2026-05-29T10:00:00.000Z"
                  agency: "Department of the Army"
                  agency_sources:
                    - kind: sam_gov
                      title: "SAM.gov Opportunity W52P1J-26-R-0047"
                      url: "https://sam.gov/opp/abc123/view"
                      retrieved_at: "2026-05-29T10:00:00.000Z"
                  naics: "541330"
                  grade: "A"
                  status: discovery
                  response_due_at: "2026-07-15T17:00:00.000Z"
                  value_min: 5000000
                  value_max: 15000000
                  teaming_flags:
                    - id: "tf_001"
                      reason: "HUBZone set-aside"
                      suggested_partner: "riverstone"
                      detail: "Riverstone (HUBZone certified) unlocks the bid."
                  analysis:
                    pwin: 0.72
                    pwin_sources:
                      - kind: internal
                        title: "ML-based Pwin model v2"
                        url: "/audit/analysis/opp_001"
                        retrieved_at: "2026-05-29T10:05:00.000Z"
                    incumbent: "CACI International"
                    incumbent_sources:
                      - kind: fpds
                        title: "FPDS predecessor contract"
                        url: "https://www.fpds.gov/ezsearch/search.do?q=W52P1J"
                        retrieved_at: "2026-05-29T10:05:00.000Z"
                    competitors:
                      - name: "Leidos"
                        threat_level: high
                    competitors_sources:
                      - kind: govwin
                        title: "GovWin competitive intel"
                        url: "https://iq.govwin.com/neo/opp/123"
                        retrieved_at: "2026-05-29T10:05:00.000Z"
                    timeline:
                      rfp_release: "2026-06-01"
                      proposals_due: "2026-07-15"
                      award_estimate: "2026-09-30"
                    timeline_sources:
                      - kind: sam_gov
                        title: "SAM.gov timeline"
                        url: "https://sam.gov/opp/abc123/view"
                        retrieved_at: "2026-05-29T10:05:00.000Z"
                    version: "v1.3.2"
                    generated_at: "2026-05-29T10:05:00.000Z"
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_ghi789
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: |
            ANALYSIS_TIMEOUT — R2 analysis could not complete within 10s.
            Per no-degradation contract, the detail endpoint never returns
            null/placeholder/stale analysis. Client must retry. Includes
            estimated_seconds in error.detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                error:
                  code: ANALYSIS_TIMEOUT
                  message: "Analysis not ready, retry in a few seconds"
                  detail: "estimated_seconds=8"
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_ghi789
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: updateOpportunity
      summary: Update opportunity
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpportunityUpdate'
            example:
              agency: "U.S. Army TACOM"
              value_max: 20000000
      responses:
        '200':
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /opportunities/{id}/qualify:
    post:
      operationId: qualifyOpportunity
      summary: Qualification action
      description: |
        Mark an opportunity as qualified. Sets qualified_at timestamp and
        runs synchronous teaming flag evaluation.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qualified_by:
                  type: string
                  description: Who qualified this opportunity (defaults to current user)
            example:
              qualified_by: "shawn"
      responses:
        '200':
          description: Qualified opportunity with teaming flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  opportunity:
                    id: "opp_001"
                    title: "Army RS3 Task Order 47"
                    qualified_at: "2026-05-29T16:10:00.000Z"
                    qualified_by: "shawn"
                  teaming_flags:
                    - id: "tf_001"
                      reason: "HUBZone set-aside"
                      suggested_partner: "riverstone"
                      detail: "Riverstone (HUBZone certified) unlocks the bid."
                meta:
                  generatedAt: "2026-05-29T16:10:00.000Z"
                  source: v3
                  requestId: req_jkl012
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Pipeline
  # ---------------------------------------------------------------------------
  /pipeline:
    get:
      operationId: listPipeline
      summary: List active captures with win prob
      description: |
        List active pipeline items with joined opportunity data.
        R1 source siblings on every field.
      tags: [Pipeline]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: capture_owner
          in: query
          description: Filter by capture owner (substring match)
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of pipeline items with R1 sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineListResponse'
              example:
                success: true
                data:
                  items:
                    - id: "pi_001"
                      opportunity_id: "opp_001"
                      opportunity_title: "Army RS3 Task Order 47"
                      opportunity_title_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      opportunity_agency: "Department of the Army"
                      opportunity_agency_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      capture_owner: "shawn"
                      capture_owner_sources:
                        - kind: internal
                          title: "Pipeline assignment"
                          url: "/audit/edits/pi_001"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      win_prob_pct: 65
                      win_prob_pct_sources:
                        - kind: internal
                          title: "Win probability assessment"
                          url: "/audit/edits/pi_001"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      milestones: []
                      teaming_partners: ["riverstone"]
                      created_at: "2026-05-25T00:00:00.000Z"
                  pagination:
                    limit: 50
                    cursor: null
                    hasMore: false
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_mno345
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createPipelineItem
      summary: Promote opportunity to pipeline
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineCreate'
            example:
              opportunity_id: "opp_001"
              capture_owner: "shawn"
              win_prob_pct: 65
              win_prob_evidence: "Incumbent relationship via RS3. NAICS alignment. Strong past performance on TACOM."
              milestones:
                - name: "Draft RFP review"
                  due_date: "2026-06-15"
                  status: pending
              teaming_partners: ["riverstone"]
      responses:
        '201':
          description: Created pipeline item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /pipeline/{id}:
    patch:
      operationId: updatePipelineItem
      summary: Update win prob, milestones, teaming
      description: |
        If win_prob_pct is set, win_prob_evidence is required
        (Data First doctrine enforcement).
      tags: [Pipeline]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineUpdate'
            example:
              win_prob_pct: 72
              win_prob_evidence: "Updated after customer engagement meeting. Strong signals from TACOM PEO."
      responses:
        '200':
          description: Updated pipeline item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Captures
  # ---------------------------------------------------------------------------
  /captures:
    get:
      operationId: listCaptures
      summary: List captures
      description: |
        List captures with joined pipeline and opportunity data.
        R1 source siblings on every field.
      tags: [Captures]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: stage
          in: query
          description: Filter by color review stage
          schema:
            type: string
        - name: behind
          in: query
          description: Captures past due but not submitted
          schema:
            type: string
            enum: ['1']
      responses:
        '200':
          description: Paginated list of captures with R1 sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureListResponse'
              example:
                success: true
                data:
                  items:
                    - id: "cap_001"
                      pipeline_item_id: "pi_001"
                      pipeline_capture_owner: "shawn"
                      opportunity_title: "Army RS3 Task Order 47"
                      opportunity_title_sources:
                        - kind: sam_gov
                          title: "SAM.gov Opportunity W52P1J-26-R-0047"
                          url: "https://sam.gov/opp/abc123/view"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      opportunity_agency: "Department of the Army"
                      color_stage: "pink"
                      created_at: "2026-05-27T00:00:00.000Z"
                      updated_at: "2026-05-29T10:00:00.000Z"
                  pagination:
                    limit: 50
                    cursor: null
                    hasMore: false
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_pqr678
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createCapture
      summary: Create capture from pipeline item
      tags: [Captures]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureCreate'
            example:
              pipeline_item_id: "pi_001"
      responses:
        '201':
          description: Created capture
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /captures/{id}:
    get:
      operationId: getCapture
      summary: Capture detail with compliance matrix (auto-analyzes per R2)
      description: |
        Returns full capture detail with compliance matrix, pricing assumptions,
        teaming worksheet, and R1 source siblings. Automatically triggers R2
        analysis.
      tags: [Captures]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Capture detail with R2 analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureDetailResponse'
              example:
                success: true
                data:
                  id: "cap_001"
                  pipeline_item_id: "pi_001"
                  opportunity_title: "Army RS3 Task Order 47"
                  color_stage: "pink"
                  pricing_notes: "Initial draft in progress"
                  compliance_items:
                    - id: "ci_001"
                      requirement: "ISO 9001:2015 certification"
                      status: compliant
                      evidence: "Certificate valid through 2027"
                  pricing_assumptions:
                    margin_pct: 12
                    labor_rates: {}
                  teaming_worksheet:
                    partners: ["riverstone"]
                    rationale: "HUBZone set-aside requires Riverstone sub"
                  analysis:
                    pwin: 0.72
                    pwin_sources:
                      - kind: internal
                        title: "ML-based Pwin model v2"
                        url: "/audit/analysis/cap_001"
                        retrieved_at: "2026-05-29T10:05:00.000Z"
                    version: "v1.3.2"
                    generated_at: "2026-05-29T10:05:00.000Z"
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_stu901
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: |
            ANALYSIS_TIMEOUT — Capture R2 analysis (pwin) could not complete
            within 10s. Never returns null/stale analysis. Client must retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                error:
                  code: ANALYSIS_TIMEOUT
                  message: "Analysis not ready, retry in a few seconds"
                  detail: "estimated_seconds=6"
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_stu901
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: updateCapture
      summary: Update stage, notes, pricing
      description: |
        If pricing_assumptions.margin_pct is provided, pricing guardrails
        are checked and included in the response.
      tags: [Captures]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureUpdate'
            example:
              pricing_notes: "Pink team feedback incorporated"
              pricing_assumptions:
                margin_pct: 14
                labor_rates:
                  senior_engineer: 185
                  project_manager: 165
      responses:
        '200':
          description: Updated capture with pricing guardrail result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Action Items
  # ---------------------------------------------------------------------------
  /action-items:
    get:
      operationId: listActionItems
      summary: List action items
      description: |
        List action items with R1 source siblings.
        Defaults to status != 'done'.
      tags: [Action Items]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ActionItemStatus'
        - name: owner
          in: query
          description: Filter by owner email
          schema:
            type: string
        - name: source
          in: query
          description: Filter by source (manual, email, system)
          schema:
            type: string
        - name: linked_record_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of action items with R1 sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionItemListResponse'
              example:
                success: true
                data:
                  items:
                    - id: "ai_001"
                      title: "Finalize RS3 TO47 pricing"
                      title_sources:
                        - kind: internal
                          title: "Manual entry"
                          url: "/audit/edits/ai_001"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      owner: "shawn"
                      owner_sources:
                        - kind: internal
                          title: "Manual entry"
                          url: "/audit/edits/ai_001"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      status: open
                      due_date: "2026-06-06"
                      due_date_sources:
                        - kind: internal
                          title: "Manual entry"
                          url: "/audit/edits/ai_001"
                          retrieved_at: "2026-05-29T10:00:00.000Z"
                      source: manual
                      drafts: []
                      created_at: "2026-05-29T10:00:00.000Z"
                  pagination:
                    limit: 50
                    cursor: null
                    hasMore: false
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_vwx234
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createActionItem
      summary: Create action item
      description: |
        Doctrine enforcement: individual owner is required. Team names
        (team, all, everyone, committee, group) are rejected with a
        validation error per Relentless Execution principle.
      tags: [Action Items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionItemCreate'
            example:
              title: "Send margin targets to Angela"
              owner: "shawn"
              due_date: "2026-06-06"
              source: manual
              linked_record_type: opportunity
              linked_record_id: "opp_001"
      responses:
        '201':
          description: Created action item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /action-items/{id}:
    patch:
      operationId: updateActionItem
      summary: Update action item
      description: Setting status to 'done' auto-sets completed_at.
      tags: [Action Items]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionItemUpdate'
            example:
              status: done
      responses:
        '200':
          description: Updated action item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /action-items/{id}/drafts:
    post:
      operationId: requestActionItemDraft
      summary: Request LLM draft (reply/research/milestone)
      tags: [Action Items]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftRequest'
            example:
              kind: reply
      responses:
        '201':
          description: Generated draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  id: "draft_002"
                  action_item_id: "ai_001"
                  kind: reply
                  draft_text: "Hi Angela, following up on RS3 TO47 pricing..."
                  status: pending
                  created_at: "2026-05-29T16:15:00.000Z"
                meta:
                  generatedAt: "2026-05-29T16:15:00.000Z"
                  source: v3
                  requestId: req_yza567
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Launchpad
