                    last_sync_status: success
                    total_synced: 1247
                  recent_runs:
                    - id: "run_001"
                      started_at: "2026-05-29T06:00:00.000Z"
                      completed_at: "2026-05-29T06:02:30.000Z"
                      status: success
                      records_fetched: 45
                      records_upserted: 12
                      records_errored: 0
                      duration_ms: 150000
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_klm789
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------
  /health:
    get:
      operationId: healthCheck
      summary: Liveness probe
      tags: [System]
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  timestamp:
                    type: string
                    format: date-time
              example:
                status: ok
                timestamp: "2026-05-29T16:00:00.000Z"

  /ready:
    get:
      operationId: readinessCheck
      summary: Readiness probe (DB connectivity)
      tags: [System]
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready]
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        enum: [connected, disconnected]
                      migrations:
                        type: string
                        enum: [current, behind, unknown]
                  timestamp:
                    type: string
                    format: date-time
              example:
                status: ready
                checks:
                  database: connected
                  migrations: current
                timestamp: "2026-05-29T16:00:00.000Z"
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [not_ready]
                  checks:
                    type: object
                  timestamp:
                    type: string
                    format: date-time

  /version:
    get:
      operationId: getVersion
      summary: Build info
      tags: [System]
      security: []
      responses:
        '200':
          description: Build version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  commit:
                    type: string
                  built_at:
                    type: string
                    format: date-time
                  node_version:
                    type: string
              example:
                version: "3.0.0"
                commit: "a1b2c3d"
                built_at: "2026-05-29T15:00:00.000Z"
                node_version: "20.14.0"

  # ---------------------------------------------------------------------------
  # Webhooks (n8n inbound — routable paths)
  # ---------------------------------------------------------------------------
  /webhooks/sam-opportunity:
    post:
      operationId: webhookSamOpportunity
      summary: n8n posts SAM.gov findings
      description: |
        Receives SAM.gov opportunity data from n8n scheduled crawl.
        Upserts opportunities into the database.
      tags: [System]
      security:
        - WebhookKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamWebhookPayload'
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/fpds-award:
    post:
      operationId: webhookFpdsAward
      summary: n8n posts FPDS award data
      description: Receives FPDS award data from n8n scheduled crawl.
      tags: [System]
      security:
        - WebhookKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FpdsWebhookPayload'
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/email-action-item:
    post:
      operationId: webhookEmailActionItem
      summary: n8n posts email-derived action items
      description: |
        Receives raw email content. Backend extracts action item via LLM,
        creates the item, and generates an initial draft.
      tags: [System]
      security:
        - WebhookKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailWebhookPayload'
      responses:
        '201':
          description: Created action item with draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Fast Track
  # ---------------------------------------------------------------------------
  /fast-track:
    post:
      operationId: triageFastTrack
      summary: Triage an opportunity via Fast Track
      description: |
        Computes input_hash, checks cache, enqueues if miss, sync-waits up to 10s.
        Returns 200 with result or 503 ANALYSIS_TIMEOUT.
      tags: [Fast Track]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FastTrackTriageInput'
      responses:
        '200':
          description: Triage result (cache hit or fresh)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FastTrackTriageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Analysis timed out after 10s sync window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

    get:
      operationId: listFastTrack
      summary: List recent fast track assessments
      description: |
        Returns newest-first, cursor-paginated list of assessments.
      tags: [Fast Track]
      parameters:
        - name: since
          in: query
          description: ISO-8601 date filter (default 7 days ago)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Page size (1-100, default 25)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque cursor from previous response
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of assessments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FastTrackListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /fast-track/{id}:
    get:
      operationId: getFastTrack
      summary: Get a single fast track assessment
      tags: [Fast Track]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Single assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FastTrackTriageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  # -------------------------------------------------------------------------
  # Security Schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token (preserved from V2)

    WebhookKeyAuth:
      type: apiKey
      in: header
      name: x-gda-key
      description: Shared webhook secret from GDA_WEBHOOK_KEY env var

  # -------------------------------------------------------------------------
  # Parameters
  # -------------------------------------------------------------------------
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: "Page size (default 50, max 200)"
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200

    CursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from previous response
      schema:
        type: string

  # -------------------------------------------------------------------------
  # Responses
  # -------------------------------------------------------------------------
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: "title is required"
              detail: null
            meta:
              generatedAt: "2026-05-29T16:00:00.000Z"
              requestId: req_err001

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: "Missing or invalid authorization"
              detail: null
            meta:
              generatedAt: "2026-05-29T16:00:00.000Z"
              requestId: req_err002

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: "Resource not found"
              detail: null
            meta:
              generatedAt: "2026-05-29T16:00:00.000Z"
              requestId: req_err003

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: RATE_LIMITED
              message: "Too many requests"
              detail: null
            meta:
              generatedAt: "2026-05-29T16:00:00.000Z"
              requestId: req_err004

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: "An unexpected error occurred"
              detail: null
            meta:
              generatedAt: "2026-05-29T16:00:00.000Z"
              requestId: req_err005

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:
    # -- Envelopes ----------------------------------------------------------
    SuccessEnvelope:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Endpoint-specific payload
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorEnvelope:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'

    Meta:
      type: object
      required: [generatedAt]
      properties:
        generatedAt:
          type: string
          format: date-time
        source:
          type: string
          default: v3
        requestId:
          type: string

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        detail:
          type: string
          nullable: true

    # -- Source citation (R1) -----------------------------------------------
    SourceRef:
      type: object
      required: [kind, title, url, retrieved_at]
      properties:
        kind:
          type: string
          enum: [sam_gov, fpds, usaspending, govwin, news, doctrine, partner_site, internal]
        title:
          type: string
        url:
          type: string
          format: uri
        retrieved_at:
          type: string
          format: date-time

    # -- Pagination ---------------------------------------------------------
    Pagination:
      type: object
      required: [limit, hasMore]
      properties:
        limit:
          type: integer
        cursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    # -- Enums --------------------------------------------------------------
    OpportunityStatus:
      type: string
      enum: [discovery, qualified, pipeline, lost, won]

    Grade:
      type: string
      enum: [A, B, C]

    ActionItemStatus:
      type: string
      enum: [open, in_progress, done]

    DraftKind:
      type: string
      enum: [reply, research, milestone]

    FlagSeverity:
      type: string
      enum: [critical, warning, info]

    # -- Opportunities ------------------------------------------------------
    OpportunityListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [items, pagination]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/OpportunitySummary'
                pagination:
                  $ref: '#/components/schemas/Pagination'

    OpportunityDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OpportunityDetail'

    OpportunitySummary:
      type: object
      required: [id, status, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        title_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        agency:
          type: string
        agency_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        naics:
          type: string
        naics_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        set_aside:
          type: string
        set_aside_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        grade:
          $ref: '#/components/schemas/Grade'
        grade_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        status:
          $ref: '#/components/schemas/OpportunityStatus'
        response_due_at:
          type: string
          format: date-time
          nullable: true
        response_due_at_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        value_min:
          type: number
          nullable: true
        value_min_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        value_max:
          type: number
          nullable: true
        value_max_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        teaming_flags:
          type: array
          items:
            $ref: '#/components/schemas/TeamingFlag'
        ai_analyzed_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of most recent successful R2 analysis. Used by list views
            to signal freshness without including the full analysis block.
            null only if analysis has never been computed (transient — pre-warm
            policy ensures coverage on ingest). See F-201 Addendum A.
        analysis_version:
          type: string
          nullable: true
          description: Model version of most recent successful analysis (e.g. "v1.3.2").
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OpportunityDetail:
      allOf:
        - $ref: '#/components/schemas/OpportunitySummary'
        - type: object
          properties:
            sam_notice_id:
              type: string
              nullable: true
            sub_agency:
              type: string
              nullable: true
            description:
              type: string
              nullable: true
            description_sources:
              type: array
              items:
                $ref: '#/components/schemas/SourceRef'
            posted_at:
              type: string
              format: date-time
              nullable: true
            qualified_at:
              type: string
              format: date-time
              nullable: true
            qualified_by:
              type: string
              nullable: true
            grade_evidence:
              type: string
              nullable: true
            analysis:
              $ref: '#/components/schemas/Analysis'
              description: |
                R2 contract invariant: when this response is returned (HTTP 200),
                analysis is ALWAYS present, fresh, and non-null. If analysis is
                not ready within 10s the endpoint returns 503 ANALYSIS_TIMEOUT.
                There is no third state (no analysis_status, no stale flag, no
                placeholder, no polling). See phase-1-api-contract.md Addendum A.
          required:
            - analysis

    OpportunityCreate:
      type: object
      required: [title, source]
      properties:
        title:
          type: string
        source:
          type: string
        sam_notice_id:
          type: string
        naics:
          type: string
        agency:
          type: string
        sub_agency:
          type: string
        description:
          type: string
        set_aside:
          type: string
        response_due_at:
          type: string
          format: date-time
        posted_at:
          type: string
          format: date-time
        value_min:
          type: number
        value_max:
          type: number

    OpportunityUpdate:
      type: object
      properties:
        title:
          type: string
        naics:
          type: string
        agency:
          type: string
        sub_agency:
          type: string
        description:
          type: string
        set_aside:
          type: string
        response_due_at:
          type: string
          format: date-time
        value_min:
          type: number
        value_max:
          type: number

    TeamingFlag:
      type: object
      properties:
        id:
          type: string
        reason:
          type: string
        suggested_partner:
          type: string
        detail:
          type: string

    # -- Analysis (R2) -----------------------------------------------------
    # NO-DEGRADATION CONTRACT (F-202 Addendum A):
    # - Endpoints returning this block ALWAYS return it fresh and complete.
    # - There is NO analysis_status field, NO stale field, NO null analysis.
    # - If analysis cannot be returned fresh within 10s, the endpoint returns
    #   503 ANALYSIS_TIMEOUT instead. Client must retry.
    Analysis:
      type: object
      required: [pwin, version, generated_at]
      properties:
        version:
          type: string
          description: Analysis model version, e.g. "v1.3.2"
        pwin:
          type: number
          minimum: 0
          maximum: 1
        pwin_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        incumbent:
          type: string
          nullable: true
        incumbent_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        competitors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              threat_level:
                type: string
                enum: [low, medium, high]
        competitors_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        blackhat:
          type: object
          nullable: true
          description: Competitor strategy assessment
        blackhat_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        wargame:
          type: object
          nullable: true
          description: Win strategy wargame output
        wargame_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        timeline:
          type: object
          nullable: true
          properties:
