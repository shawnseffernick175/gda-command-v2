                      retrieved_at: "2026-05-29T06:00:00.000Z"
                  recent_awards: []
                  teaming_history: []
                meta:
                  generatedAt: "2026-05-29T16:00:00.000Z"
                  source: v3
                  requestId: req_hij456
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
