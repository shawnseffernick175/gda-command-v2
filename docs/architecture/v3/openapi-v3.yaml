  # ---------------------------------------------------------------------------
  # Sources
  # ---------------------------------------------------------------------------
  /sources/{id}:
    get:
      operationId: getSource
      summary: Resolve source by ID
      description: |
        Returns source URL and metadata for a given source registry entry.
        Used by the SourceBadge frontend component.
      tags: [Sources]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Source detail with recent sync runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDetailResponse'
              example:
                success: true
                data:
                  source:
                    id: "src_001"
                    name: "SAM.gov"
                    source_type: api
                    category: opportunities
                    base_url: "https://sam.gov"
