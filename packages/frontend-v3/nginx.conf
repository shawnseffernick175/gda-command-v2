server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Allow large file uploads
    client_max_body_size 50m;

    # Static assets with cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # AI analysis calls a slow LLM synchronously (typically 15-30s). Give this
    # one endpoint a generous timeout so nginx does not 504 mid-generation.
    # Exact-match so it takes precedence over the general /v3/ prefix block.
    location = /v3/financials/ai-analyze {
        resolver 127.0.0.11 valid=30s;
        set $backend http://gda-backend-v3:4000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    # V3 API → backend-v3 service on docker network
    location /v3/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://gda-backend-v3:4000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    # SPA fallback — Next.js static export puts pages at /page.html, not /page/index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
