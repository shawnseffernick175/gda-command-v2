volumes:
  db_storage:
  n8n_storage:
  redis_storage:
  shared_files:

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - N8N_PUBLIC_API_DISABLED=false
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.d:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
    - envision-internal

  redis:
    image: redis:6-alpine
    restart: always
    networks:
    - envision-internal

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    environment:
      - DB_TYPE
      - DB_POSTGRESDB_HOST
      - DB_POSTGRESDB_PORT
      - DB_POSTGRESDB_DATABASE
      - DB_POSTGRESDB_USER
      - DB_POSTGRESDB_PASSWORD
      - N8N_ENCRYPTION_KEY
      - EXECUTIONS_MODE
      - QUEUE_BULL_REDIS_HOST
      - QUEUE_BULL_REDIS_PORT
      - EXECUTIONS_DATA_PRUNE
      - EXECUTIONS_DATA_MAX_AGE
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS
      - EXECUTIONS_PROCESS=main
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - WEBHOOK_URL=https://n8n.csr-llc.tech/
      - N8N_CORS_ALLOWED_ORIGINS=https://gda.csr-llc.tech,https://app.csr-llc.tech,http://localhost:5173,http://localhost:3000
      - N8N_COMMUNITY_PACKAGES_ENABLED
      - N8N_BLOCK_ENV_ACCESS_IN_NODE
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=300
      - GENERIC_TIMEZONE
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - TAVILY_API_KEY
      - PINECONE_API_KEY
      - PINECONE_HOST
      - SAM_GOV_API_KEY
      - GDA_QA_N8N_API_KEY
      - GDA_WEBHOOK_HEADER_VALUE
      - GDA_QA_AGENT_KEY
      - GDA_FIX_AGENT_KEY
      - GDA_SAM_API_KEY
      - GDA_WEBHOOK_HEADER_VALUE_V2
      - GDA_API_KEY_2026
      - GDA_DEPLOY_KEY_2026
      - GDA_WEBHOOK_SECRET_2026
      - GDA_TAVILY_API_KEY
      - GDA_DEPLOY_KEY_V2
      - GDA_DEPLOY_KEY_V2_CP
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
      - shared_files:/files
    networks:
    - envision-internal
    - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.csr-llc.tech`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=mytlschallenge"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=n8n_default"

networks:
  envision-internal:
  n8n_default:
    external: true
