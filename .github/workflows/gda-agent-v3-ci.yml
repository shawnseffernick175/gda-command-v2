name: Agent V3 CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/gda-agent-v3/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/gda-agent-v3/**'

jobs:
  test:
    name: Agent V3 — Lint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gda-agent-v3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/gda-agent-v3/requirements*.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint — ruff check
        run: python -m ruff check src/ tests/
      - name: Lint — ruff format check
        run: python -m ruff format --check src/ tests/
      - name: Typecheck — pyright
        run: python -m pyright src/
      - name: Run tests
        env:
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          AGENT_DB_URL: postgresql://test:test@localhost:5432/test
          AGENT_DB_RO_URL: postgresql://test:test@localhost:5432/test
          AGENT_SERVICE_TOKEN: test-token
          SAM_GOV_API_KEY: test-sam-key
          BACKEND_V3_URL: http://localhost:4000
        run: python -m pytest tests/ -v --tb=short
