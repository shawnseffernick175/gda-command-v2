# Gate 1 — Forbidden token check (R2 no-degradation contract)
#
# Enforces F-201 Addendum A.5: these tokens are permanently removed from
# the V3 API surface.  Any match outside of explicitly allowed comments
# FAILS the PR — degradations must be physically uncommittable.
#
# Canonical forbidden list (copy-verbatim from F-201 Addendum A.5):
#   - analysis_status  (column, field, or enum)
#   - stale: true  /  stale: boolean  /  "stale"  (as analysis flag)
#   - analysis: null  (in any response example)
#   - "not_yet_analyzed"  /  "running"  /  "pending"  (as analysis states)
#
# Allowlist (F-204b):
#   - Test files (*.test.ts, *.spec.ts, /tests/) — they verify the contract
#   - YAML description: blocks and comments — they document the contract
#   - Files with FORBIDDEN magic-comment marker — explicit opt-out (rare)

name: V3 Forbidden Tokens

on:
  pull_request:
    paths:
      - 'apps/backend-v3/**'
      - 'db/v3/migrations/**'
      - 'docs/architecture/v3/openapi-v3.yaml'
      - 'scripts/ci/forbidden-token-scan.sh'
      - 'tests/ci/**'
      - '.github/workflows/v3-forbidden-tokens.yml'

jobs:
  gate-self-test:
    name: Gate self-test (fixture validation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gate self-tests
        shell: bash
        run: |
          set -euo pipefail
          PASS=0
          FAIL=0
          SCRIPT="./scripts/ci/forbidden-token-scan.sh"
          FIXTURES="tests/ci/fixtures/forbidden-tokens"

          # Create a temp directory inside apps/backend-v3/tests/ so that
          # the test-exclusion fixtures are scanned via a path the scanner
          # recognises as an excluded test directory.
          TEST_DIR="apps/backend-v3/tests/__gate_fixtures__"
          mkdir -p "$TEST_DIR"
          ln -sf "$PWD/$FIXTURES/fixture-legit-test.test.ts" \
            "$TEST_DIR/fixture-legit-test.test.ts"
          ln -sf "$PWD/$FIXTURES/fixture-legit-anti-token-test.test.ts" \
            "$TEST_DIR/fixture-legit-anti-token-test.test.ts"

          run_expect() {
            local fixture="$1"
            local expect="$2"  # "pass" or "fail"
            local label="$3"

            if "$SCRIPT" "$fixture" > /tmp/gate-output.txt 2>&1; then
              actual="pass"
            else
              actual="fail"
            fi

            if [ "$actual" = "$expect" ]; then
              echo "  OK   $label (expected $expect, got $actual)"
              PASS=$((PASS + 1))
            else
              echo "  FAIL $label (expected $expect, got $actual)"
              cat /tmp/gate-output.txt
              FAIL=$((FAIL + 1))
            fi
          }

          echo "=== Gate Self-Tests ==="

          # Violations — must FAIL
          run_expect "$FIXTURES/fixture-violation-route.ts" \
            "fail" "fixture-violation-route.ts (src-like code with analysis_status)"

          run_expect "$FIXTURES/fixture-violation-migration.sql" \
            "fail" "fixture-violation-migration.sql (migration with stale column)"

          # Legit test files — must PASS (scanned via apps/backend-v3/tests/ path)
          run_expect "$TEST_DIR/fixture-legit-test.test.ts" \
            "pass" "fixture-legit-test.test.ts (test file with analysis: null)"

          run_expect "$TEST_DIR/fixture-legit-anti-token-test.test.ts" \
            "pass" "fixture-legit-anti-token-test.test.ts (anti-token test needles)"

          # YAML — descriptions pass, enum violations fail
          run_expect "$FIXTURES/fixture-legit-openapi.yaml" \
            "pass" "fixture-legit-openapi.yaml (tokens in description blocks only)"

          run_expect "$FIXTURES/fixture-legit-openapi-violation.yaml" \
            "fail" "fixture-legit-openapi-violation.yaml (token in enum value)"

          # Cleanup
          rm -rf "$TEST_DIR"

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::Gate self-tests failed. The scanner is broken."
            exit 1
          fi

  forbidden-tokens:
    name: R2 forbidden token scan
    needs: gate-self-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for forbidden tokens
        shell: bash
        run: ./scripts/ci/forbidden-token-scan.sh
