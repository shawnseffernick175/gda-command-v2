name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm test --workspace=packages/shared --if-present

  v3-contract:
    name: V3 Contract Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gda
          POSTGRES_PASSWORD: gda_ci_password
          POSTGRES_DB: gda_command
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gda -d gda_command"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: V3 backend — build
        working-directory: apps/backend-v3
        run: npx tsc --noEmit
      - name: V3 backend — auth tests (unit-level, standalone DB)
        working-directory: apps/backend-v3
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_command
          JWT_SECRET: ci-jwt-secret
          GDA_WEBHOOK_KEY: ci-webhook-key
          NODE_ENV: test
        run: npx vitest run tests/auth.test.ts
      - name: V3 backend — contract + integration tests (testcontainer)
        working-directory: apps/backend-v3
        env:
          NODE_ENV: test
          LLM_ROUTER_MODE: mock
        run: npx vitest run --config vitest.integration.config.ts tests/integration/contract.test.ts tests/integration/captures-contract.test.ts tests/integration/f213-cutover-contract.test.ts tests/integration/integration.test.ts tests/integration/captures-integration.test.ts tests/integration/pipeline.test.ts

  migration-parity-check:
    name: Migration Parity Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gda
          POSTGRES_PASSWORD: gda_ci_password
          POSTGRES_DB: gda_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gda -d gda_migration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Seed legacy fixture tables
        env:
          PGPASSWORD: gda_ci_password
        run: psql -h localhost -U gda -d gda_migration_test -f apps/backend-v3/src/migration/fixtures/legacy/seed.sql
      - name: Run migration — dry-run
        working-directory: apps/backend-v3
        env:
          LEGACY_DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_migration_test
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_migration_test
          NODE_ENV: test
        run: npx tsx src/migration/run.ts
      - name: Run migration — commit
        working-directory: apps/backend-v3
        env:
          LEGACY_DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_migration_test
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_migration_test
          NODE_ENV: test
        run: npx tsx src/migration/run.ts --commit
      - name: Run migration tests
        working-directory: apps/backend-v3
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_migration_test
          NODE_ENV: test
        run: npx vitest run tests/migration/
      - name: Verify fixture gap list within bounds
        env:
          PGPASSWORD: gda_ci_password
        run: |
          EXPECTED_GAPS="apps/backend-v3/src/migration/fixtures/legacy/expected-gaps.json"
          MAX_GAPS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$EXPECTED_GAPS','utf8')).max_total_gaps)")
          echo "Max allowed gaps: $MAX_GAPS"
          ACTUAL_GAPS=$(psql -h localhost -U gda -d gda_migration_test -t -A -c "SELECT COUNT(*)::int FROM v3_opportunities WHERE analysis IS NOT NULL AND (analysis->>'pwin' IS NOT NULL AND (analysis->'pwin_sources' IS NULL OR jsonb_array_length(analysis->'pwin_sources') = 0))" 2>/dev/null || echo "0")
          echo "Actual gaps: $ACTUAL_GAPS"
          if [ "$ACTUAL_GAPS" -gt "$MAX_GAPS" ]; then
            echo "::error::Gap count $ACTUAL_GAPS exceeds max allowed $MAX_GAPS"
            exit 1
          fi
          echo "Migration parity check passed fixture validation"

  compose-drift:
    name: Compose Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify compose file hashes match expected
        run: |
          HASH_FILE=".github/expected-compose-hashes.txt"
          if [ ! -f "$HASH_FILE" ]; then
            echo "::error::Missing $HASH_FILE — run: sha256sum docker-compose.prod.yml | awk '{print \$2, \$1}' > .github/expected-compose-hashes.txt"
            exit 1
          fi
          DRIFT=0
          while IFS=' ' read -r file expected; do
            # Skip comments and blank lines
            [[ "$file" =~ ^#.*$ || -z "$file" ]] && continue
            if [ ! -f "$file" ]; then
              echo "::error::Compose file $file listed in hash file but does not exist"
              DRIFT=1
              continue
            fi
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$actual" != "$expected" ]; then
              echo "::error::DRIFT DETECTED in $file — expected $expected, got $actual. Update .github/expected-compose-hashes.txt if this change is intentional."
              DRIFT=1
            else
              echo "OK: $file hash matches"
            fi
          done < "$HASH_FILE"
          if [ "$DRIFT" -ne 0 ]; then
            echo ""
            echo "To fix: update .github/expected-compose-hashes.txt with current hashes:"
            echo "  sha256sum docker-compose.prod.yml | awk '{print \$2, \$1}' > .github/expected-compose-hashes.txt"
            exit 1
          fi
          echo "All compose file hashes match — no drift detected"

      - name: Verify connector env-var parity (code ↔ compose)
        run: |
          COMPOSE="docker-compose.prod.yml"
          DRIFT=0

          # Extract env var names read in backend-v3 connector code
          BACKEND_VARS=$(grep -rhoP "process\.env[.\[]['\"']?(GOVTRIBE_\w+|GOVWIN_\w+|ENABLE_GOVTRIBE_\w+)" \
            apps/backend-v3/src/ 2>/dev/null \
            | grep -oP '(GOVTRIBE_\w+|GOVWIN_\w+|ENABLE_GOVTRIBE_\w+)' \
            | sort -u || true)

          # Extract env var names read in agent-v3 connector code
          AGENT_VARS=$(grep -rhoP "(os\.getenv|os\.environ)[.(\\[]['\"']?(GOVTRIBE_\w+|GOVWIN_\w+|ENABLE_GOVTRIBE_\w+)" \
            apps/gda-agent-v3/src/ 2>/dev/null \
            | grep -oP '(GOVTRIBE_\w+|GOVWIN_\w+|ENABLE_GOVTRIBE_\w+)' \
            | sort -u || true)

          echo "=== backend-v3 connector env reads ==="
          echo "$BACKEND_VARS"
          echo ""
          echo "=== agent-v3 connector env reads ==="
          echo "${AGENT_VARS:-<none>}"
          echo ""

          # Extract per-service environment blocks from compose
          BACKEND_BLOCK=$(awk '/^  backend-v3:/{f=1; next} f && /^  [a-z]/{f=0} f' "$COMPOSE")
          AGENT_BLOCK=$(awk '/^  gda-agent-v3:/{f=1; next} f && /^  [a-z]/{f=0} f' "$COMPOSE")

          # Check backend-v3 vars are in the backend-v3 service block
          for var in $BACKEND_VARS; do
            if ! echo "$BACKEND_BLOCK" | grep -qP "^\s+${var}:"; then
              echo "::error::MISSING in compose backend-v3: $var (read by apps/backend-v3/src but not in backend-v3 environment block)"
              DRIFT=1
            fi
          done

          # Check agent-v3 vars are in the gda-agent-v3 service block
          for var in $AGENT_VARS; do
            if ! echo "$AGENT_BLOCK" | grep -qP "^\s+${var}:"; then
              echo "::error::MISSING in compose gda-agent-v3: $var (read by apps/gda-agent-v3/src but not in gda-agent-v3 environment block)"
              DRIFT=1
            fi
          done

          if [ "$DRIFT" -ne 0 ]; then
            echo ""
            echo "Connector code reads env vars not passed through docker-compose.prod.yml."
            echo "Add \${VAR:-} entries to the appropriate service environment block."
            echo "See docs/v3-cognition/connector-secrets.md for the full checklist."
            exit 1
          fi
          echo "All connector env vars have compose passthroughs — no drift"

  mcp-server-resolve:
    name: MCP Server — backend-v3 resolve check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build backend-v3 (required by MCP server at runtime)
        run: npm run build --workspace=@gda/backend-v3
      - name: Verify @gda/backend-v3 modules resolve
        working-directory: apps/gda-mcp-server
        run: npx vitest run tests/backend-v3-resolve.test.ts

  llm-router-gates:
    name: LLM Router Gates (F-215 D4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: SDK drift — no direct imports outside providers/
        run: ./scripts/ci/llm-sdk-drift.sh
      - name: Routing table completeness
        working-directory: apps/backend-v3
        env:
          MOCK_LLM: '1'
          ANTHROPIC_API_KEY: ci-fake
          OPENAI_API_KEY: ci-fake
          NODE_ENV: test
        run: npx vitest run tests/llm-router.test.ts --reporter=verbose

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
