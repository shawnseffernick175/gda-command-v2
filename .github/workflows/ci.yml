name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm test --workspace=packages/shared --workspace=packages/backend --workspace=packages/frontend --if-present

  migrations:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gda
          POSTGRES_PASSWORD: gda_ci_password
          POSTGRES_DB: gda
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gda -d gda"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run all migrations from scratch
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        run: npx tsx packages/backend/src/db/migrate.ts
      - name: Regression test — migration 044 non-UUID IDs
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        run: npx tsx packages/backend/src/db/test-migration-044.ts
      - name: Regression test — no duplicate migration numbers (F-010)
        run: npx tsx packages/backend/src/db/test-unique-migration-numbers.ts
      - name: Regression test — migration 045 state-dependent rename (F-010)
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        run: npx tsx packages/backend/src/db/test-migration-045.ts
      - name: Regression test — no missing migration numbers (F-011)
        run: npx tsx packages/backend/src/db/test-migration-completeness.ts
      - name: Regression test — migration 048 DIBBS cleanup (F-005)
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        run: npx tsx packages/backend/src/db/test-migration-048.ts
      - name: Regression test — migration 049 reverse GovTribe deprecation (F-005)
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        run: npx tsx packages/backend/src/db/test-migration-049.ts
      - name: Paired migration tests (F-017 harness)
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda
        working-directory: packages/backend
        run: npx vitest run --config vitest.migration.config.ts

  migrations-staging:
    name: Migration Smoke Test (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set up SSH tunnel to staging
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "::error::ENVIRONMENTAL FAILURE: VPS_SSH_KEY or VPS_HOST secret not configured. This is an infrastructure issue, not a migration failure."
            echo "staging_unreachable=true" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$STAGING_DB_PASSWORD" ]; then
            echo "::error::ENVIRONMENTAL FAILURE: STAGING_DB_PASSWORD secret not configured. Set it via: gh secret set STAGING_DB_PASSWORD --repo shawnseffernick175/gda-command-v2"
            echo "staging_unreachable=true" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -f -N -L 15432:127.0.0.1:5433 -i ~/.ssh/vps_key -o StrictHostKeyChecking=no root@"$VPS_HOST"
          sleep 2
          echo "SSH tunnel established on port 15432"
      - name: Run migrations against staging
        if: env.staging_unreachable != 'true'
        env:
          DATABASE_URL: postgresql://gda_staging:${{ secrets.STAGING_DB_PASSWORD }}@localhost:15432/gda_staging
        run: |
          npx tsx packages/backend/src/db/migrate.ts
          echo "All migrations passed against staging"
      - name: Report staging unreachable
        if: env.staging_unreachable == 'true'
        run: |
          echo "::warning::Staging DB unreachable (environmental). Skipping staging migration test. This does NOT indicate a migration problem."

  v3-contract:
    name: V3 Contract Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gda
          POSTGRES_PASSWORD: gda_ci_password
          POSTGRES_DB: gda_command
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gda -d gda_command"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: V3 backend — build
        working-directory: apps/backend-v3
        run: npx tsc --noEmit
      - name: V3 backend — auth + contract tests
        working-directory: apps/backend-v3
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_command
          JWT_SECRET: ci-jwt-secret
          GDA_WEBHOOK_KEY: ci-webhook-key
          NODE_ENV: test
        run: npx vitest run tests/auth.test.ts tests/contract.test.ts
      - name: V3 backend — integration tests
        working-directory: apps/backend-v3
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_command
          JWT_SECRET: ci-jwt-secret
          GDA_WEBHOOK_KEY: ci-webhook-key
          NODE_ENV: test
          ANALYSIS_VERSION: v0.0.1-test
          ANALYSIS_TIMEOUT_MS: "5000"
          ANALYSIS_POLL_INTERVAL_MS: "50"
        run: npx vitest run tests/integration.test.ts
      - name: V3 backend — pipeline tests
        working-directory: apps/backend-v3
        env:
          DATABASE_URL: postgresql://gda:gda_ci_password@localhost:5432/gda_command
          JWT_SECRET: ci-jwt-secret
          GDA_WEBHOOK_KEY: ci-webhook-key
          NODE_ENV: test
          ANALYSIS_VERSION: v0.0.1-test
        run: npx vitest run tests/pipeline.test.ts

  compose-drift:
    name: Compose Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify compose file hashes match expected
        run: |
          HASH_FILE=".github/expected-compose-hashes.txt"
          if [ ! -f "$HASH_FILE" ]; then
            echo "::error::Missing $HASH_FILE — run: sha256sum docker-compose*.yml | awk '{print \$2, \$1}' > .github/expected-compose-hashes.txt"
            exit 1
          fi
          DRIFT=0
          while IFS=' ' read -r file expected; do
            # Skip comments and blank lines
            [[ "$file" =~ ^#.*$ || -z "$file" ]] && continue
            if [ ! -f "$file" ]; then
              echo "::error::Compose file $file listed in hash file but does not exist"
              DRIFT=1
              continue
            fi
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$actual" != "$expected" ]; then
              echo "::error::DRIFT DETECTED in $file — expected $expected, got $actual. Update .github/expected-compose-hashes.txt if this change is intentional."
              DRIFT=1
            else
              echo "OK: $file hash matches"
            fi
          done < "$HASH_FILE"
          if [ "$DRIFT" -ne 0 ]; then
            echo ""
            echo "To fix: update .github/expected-compose-hashes.txt with current hashes:"
            echo "  sha256sum docker-compose.prod.yml docker-compose.n8n.yml | awk '{print \$2, \$1}' > .github/expected-compose-hashes.txt"
            exit 1
          fi
          echo "All compose file hashes match — no drift detected"

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
