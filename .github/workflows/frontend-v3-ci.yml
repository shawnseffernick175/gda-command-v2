name: Frontend V3 CI

on:
  pull_request:
    paths:
      - 'packages/frontend-v3/**'
      - '.github/workflows/frontend-v3-ci.yml'

jobs:
  build-typecheck-lint:
    name: Frontend V3 (Build + Typecheck + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build -w packages/frontend-v3
      - name: Typecheck
        run: npm run typecheck -w packages/frontend-v3
      - name: Lint
        run: npm run lint -w packages/frontend-v3
      - name: Guard — no V2 imports in V3
        run: |
          if grep -r "packages/frontend/" --include="*.ts" --include="*.tsx" packages/frontend-v3/src/; then
            echo "::error::V3 code must not import from packages/frontend/ (V2)"
            exit 1
          fi
          echo "No V2 imports found in frontend-v3 — OK"
