name: Visual Token Guardrail

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-visual-tokens:
    name: Forbidden Visual Token Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run visual token guardrail
        run: node scripts/check-visual-tokens.mjs
