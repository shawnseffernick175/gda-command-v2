services:
  traefik-v3:
    image: traefik:v3.6.8
    container_name: gda-traefik-v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=gda-command-v2_edge"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=shawn.seffernick175@gmail.com"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - gda-letsencrypt:/letsencrypt
    networks:
      - edge
    deploy:
      resources:
        limits:
          memory: 128M

  postgres-staging:
    image: pgvector/pgvector:pg16
    container_name: gda-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-gda_staging}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-gda_staging}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-gda_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gda
      - edge

  backend-v3:
    build:
      context: .
      dockerfile: apps/backend-v3/Dockerfile
      args:
        DEPLOY_COMMIT_SHA: ${DEPLOY_COMMIT_SHA:-unknown}
    container_name: gda-backend-v3
    restart: unless-stopped
    volumes:
      - vaultdata:/app/data
    depends_on:
      postgres-staging:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${STAGING_POSTGRES_USER:-gda_staging}:${STAGING_POSTGRES_PASSWORD}@postgres-staging:5432/${STAGING_POSTGRES_DB:-gda_staging}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://gda.csr-llc.tech}
      GDA_WEBHOOK_KEY: ${GDA_WEBHOOK_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANALYSIS_VERSION: ${ANALYSIS_VERSION:-v1.0.0}
      ANALYSIS_TIMEOUT_MS: ${ANALYSIS_TIMEOUT_MS:-20000}
      LOG_LEVEL: ${LOG_LEVEL_V3:-info}
      SAM_GOV_API_KEY: ${SAM_GOV_API_KEY:-}
      AGENT_V3_URL: http://gda-agent-v3:8001
      AGENT_SERVICE_TOKEN: ${AGENT_SERVICE_TOKEN:-}
      # --- GovTribe connector (F-303 / #557 / #565) ---
      GOVTRIBE_API_KEY: ${GOVTRIBE_API_KEY:-}
      GOVTRIBE_API_BASE: ${GOVTRIBE_API_BASE:-https://api.govtribe.com/v1}
      GOVTRIBE_CYCLE_CREDIT_CAP: ${GOVTRIBE_CYCLE_CREDIT_CAP:-150}
      GOVTRIBE_MONTHLY_CREDIT_CAP: ${GOVTRIBE_MONTHLY_CREDIT_CAP:-1200}
      ENABLE_GOVTRIBE_INGEST: ${ENABLE_GOVTRIBE_INGEST:-}
      # --- SBIR/STTR (DoD DSIP) ingest (F-431) ---
      ENABLE_SBIR_INGEST: ${ENABLE_SBIR_INGEST:-}
      GOVTRIBE_MCP_URL: ${GOVTRIBE_MCP_URL:-}
      GOVTRIBE_CYCLE_WINDOW_HOURS: ${GOVTRIBE_CYCLE_WINDOW_HOURS:-48}
      # --- GovWin IQ connector — CAS auth (F-Govwin / #561) ---
      GOVWIN_USERNAME: ${GOVWIN_USERNAME:-}
      GOVWIN_PASSWORD: ${GOVWIN_PASSWORD:-}
      GOVWIN_CONNECTOR_V1: ${GOVWIN_CONNECTOR_V1:-}
      # --- GovWin OAuth2 Web Services API (F-332) ---
      GOVWIN_CLIENT_ID: ${GOVWIN_CLIENT_ID:-}
      GOVWIN_CLIENT_SECRET: ${GOVWIN_CLIENT_SECRET:-}
      GOVWIN_API_BASE: ${GOVWIN_API_BASE:-}
      GOVWIN_TOKEN_URL: ${GOVWIN_TOKEN_URL:-}
      GOVWIN_DAILY_LIMIT: ${GOVWIN_DAILY_LIMIT:-200}
      GOVWIN_ALLOW_SCRAPE: ${GOVWIN_ALLOW_SCRAPE:-false}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gda-v3.rule=Host(`gda-v3.csr-llc.tech`)"
      - "traefik.http.routers.gda-v3.entrypoints=websecure"
      - "traefik.http.routers.gda-v3.tls=true"
      - "traefik.http.routers.gda-v3.tls.certresolver=mytlschallenge"
      - "traefik.http.services.gda-v3.loadbalancer.server.port=4000"
      - "traefik.docker.network=gda-command-v2_edge"
    networks:
      - gda
      - edge

  gda-agent-v3:
    build:
      context: .
      dockerfile: apps/gda-agent-v3/Dockerfile
    container_name: gda-agent-v3
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_DB_URL: postgresql://${STAGING_POSTGRES_USER:-gda_staging}:${STAGING_POSTGRES_PASSWORD}@postgres-staging:5432/${STAGING_POSTGRES_DB:-gda_staging}
      AGENT_DB_RO_URL: postgresql://${AGENT_RO_USER:-gda_agent_ro}:${AGENT_RO_PASSWORD:-agent_ro_default}@postgres-staging:5432/${STAGING_POSTGRES_DB:-gda_staging}
      AGENT_SERVICE_TOKEN: ${AGENT_SERVICE_TOKEN:-}
      SAM_GOV_API_KEY: ${SAM_GOV_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BACKEND_V3_URL: http://gda-backend-v3:4000
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL:-openai:gpt-4o}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-12}
      AGENT_WALL_TIMEOUT_S: ${AGENT_WALL_TIMEOUT_S:-30}
      AGENT_HOURLY_COST_LIMIT_USD: ${AGENT_HOURLY_COST_LIMIT_USD:-5}
      # --- GovTribe connector (F-303 / #557 / #565) ---
      GOVTRIBE_API_KEY: ${GOVTRIBE_API_KEY:-}
      GOVTRIBE_API_BASE: ${GOVTRIBE_API_BASE:-https://api.govtribe.com/v1}
      GOVTRIBE_CYCLE_CREDIT_CAP: ${GOVTRIBE_CYCLE_CREDIT_CAP:-150}
      GOVTRIBE_MONTHLY_CREDIT_CAP: ${GOVTRIBE_MONTHLY_CREDIT_CAP:-1200}
      ENABLE_GOVTRIBE_INGEST: ${ENABLE_GOVTRIBE_INGEST:-}
      # --- SBIR/STTR (DoD DSIP) ingest (F-431) ---
      ENABLE_SBIR_INGEST: ${ENABLE_SBIR_INGEST:-}
      GOVTRIBE_MCP_URL: ${GOVTRIBE_MCP_URL:-}
      GOVTRIBE_CYCLE_WINDOW_HOURS: ${GOVTRIBE_CYCLE_WINDOW_HOURS:-48}
      # --- GovWin IQ connector — CAS auth (F-Govwin / #561) ---
      GOVWIN_USERNAME: ${GOVWIN_USERNAME:-}
      GOVWIN_PASSWORD: ${GOVWIN_PASSWORD:-}
      GOVWIN_CONNECTOR_V1: ${GOVWIN_CONNECTOR_V1:-}
      # --- GovWin OAuth2 Web Services API (F-332) ---
      GOVWIN_CLIENT_ID: ${GOVWIN_CLIENT_ID:-}
      GOVWIN_CLIENT_SECRET: ${GOVWIN_CLIENT_SECRET:-}
      GOVWIN_API_BASE: ${GOVWIN_API_BASE:-}
      GOVWIN_DAILY_LIMIT: ${GOVWIN_DAILY_LIMIT:-200}
      GOVWIN_ALLOW_SCRAPE: ${GOVWIN_ALLOW_SCRAPE:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - gda

  frontend-v3:
    build:
      context: .
      dockerfile: packages/frontend-v3/Dockerfile
      args:
        VITE_V3_API_URL: https://gda.csr-llc.tech
    container_name: gda-frontend-v3
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gda-v3-ui.rule=Host(`gda.csr-llc.tech`) || Host(`app.csr-llc.tech`) || Host(`gda-v3-ui.csr-llc.tech`)"
      - "traefik.http.routers.gda-v3-ui.entrypoints=websecure"
      - "traefik.http.routers.gda-v3-ui.tls=true"
      - "traefik.http.routers.gda-v3-ui.tls.certresolver=mytlschallenge"
      - "traefik.http.services.gda-v3-ui.loadbalancer.server.port=80"
      - "traefik.docker.network=gda-command-v2_edge"
    networks:
      - gda
      - edge

  gda-mcp-server:
    build:
      context: .
      dockerfile: apps/gda-mcp-server/Dockerfile
      args:
        DEPLOY_COMMIT_SHA: ${DEPLOY_COMMIT_SHA:-unknown}
    container_name: gda-mcp-server
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MCP_PORT: 4100
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${STAGING_POSTGRES_USER:-gda_staging}:${STAGING_POSTGRES_PASSWORD}@postgres-staging:5432/${STAGING_POSTGRES_DB:-gda_staging}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      # --- LegiScan legislation search (F-506) ---
      LEGISCAN_API_KEY: ${LEGISCAN_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gda-mcp.rule=Host(`gda-mcp.csr-llc.tech`)"
      - "traefik.http.routers.gda-mcp.entrypoints=websecure"
      - "traefik.http.routers.gda-mcp.tls=true"
      - "traefik.http.routers.gda-mcp.tls.certresolver=mytlschallenge"
      - "traefik.http.services.gda-mcp.loadbalancer.server.port=4100"
      - "traefik.docker.network=gda-command-v2_edge"
    networks:
      - gda
      - edge

networks:
  gda:
    driver: bridge
  edge:
    driver: bridge
    name: gda-command-v2_edge

volumes:
  pgdata-staging:
  vaultdata:
  gda-letsencrypt:
