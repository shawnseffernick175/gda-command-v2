version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gda} -d ${POSTGRES_DB:-gda}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gda
      - traefik

  postgres-staging:
    image: pgvector/pgvector:pg16
    container_name: gda-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-gda_staging}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-gda_staging}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-gda_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gda
      - traefik

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        DEPLOY_COMMIT_SHA: ${DEPLOY_COMMIT_SHA:-unknown}
    container_name: gda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-gda}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gda}}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-}
      AUTH_REQUIRED: "true"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      N8N_DATABASE_URL: ${N8N_DATABASE_URL:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_API_BASE: ${N8N_API_BASE:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      GDA_WEBHOOK_KEY: ${GDA_WEBHOOK_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SAM_API_KEY: ${SAM_API_KEY:-}
      GOVTRIBE_API_KEY: ${GOVTRIBE_API_KEY:-}
      GOVWIN_CLIENT_ID: ${GOVWIN_CLIENT_ID:-}
      GOVWIN_CLIENT_SECRET: ${GOVWIN_CLIENT_SECRET:-}
      GOVWIN_USERNAME: ${GOVWIN_USERNAME:-}
      GOVWIN_PASSWORD: ${GOVWIN_PASSWORD:-}
      GOVWIN_SAVED_SEARCH_IDS: ${GOVWIN_SAVED_SEARCH_IDS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FEED_SYNC_INTERVAL_HOURS: ${FEED_SYNC_INTERVAL_HOURS:-6}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-https://gda.csr-llc.tech}
      BACKUP_DIR: /var/backups/gda
      UPLOAD_DIR: /var/uploads/gda
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_HOST: ${PINECONE_HOST:-}
    volumes:
      - gda-backups:/var/backups/gda
      - gda-uploads:/var/uploads/gda
    networks:
      - gda
      - traefik
      - n8n-internal

  backend-v3:
    build:
      context: .
      dockerfile: apps/backend-v3/Dockerfile
      args:
        DEPLOY_COMMIT_SHA: ${DEPLOY_COMMIT_SHA:-unknown}
    container_name: gda-backend-v3
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${STAGING_POSTGRES_USER:-gda_staging}:${STAGING_POSTGRES_PASSWORD}@postgres-staging:5432/${STAGING_POSTGRES_DB:-gda_staging}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      GDA_WEBHOOK_KEY: ${GDA_WEBHOOK_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANALYSIS_VERSION: ${ANALYSIS_VERSION:-v0.0.1-stub}
      ANALYSIS_TIMEOUT_MS: ${ANALYSIS_TIMEOUT_MS:-10000}
      LOG_LEVEL: ${LOG_LEVEL_V3:-info}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gda-v3.rule=Host(`gda-v3.csr-llc.tech`)"
      - "traefik.http.routers.gda-v3.tls=true"
      - "traefik.http.routers.gda-v3.tls.certresolver=mytlschallenge"
      - "traefik.http.services.gda-v3.loadbalancer.server.port=4000"
      - "traefik.docker.network=n8n_default"
    networks:
      - gda
      - traefik

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: gda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gda-app.rule=Host(`app.csr-llc.tech`) || Host(`gda.csr-llc.tech`)"
      - "traefik.http.routers.gda-app.tls=true"
      - "traefik.http.routers.gda-app.tls.certresolver=mytlschallenge"
      - "traefik.http.services.gda-app.loadbalancer.server.port=80"
      - "traefik.docker.network=n8n_default"
    networks:
      - gda
      - traefik

networks:
  gda:
    driver: bridge
  traefik:
    external: true
    name: n8n_default
  n8n-internal:
    external: true
    name: n8n-envision_envision-internal

volumes:
  pgdata:
  pgdata-staging:
  gda-backups:
  gda-uploads:
