version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gda_command}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gda} -d ${POSTGRES_DB:-gda_command}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gda

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: gda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gda}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gda_command}
      AUTH_REQUIRED: "true"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_API_BASE: ${N8N_API_BASE:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      GDA_WEBHOOK_KEY: ${GDA_WEBHOOK_KEY:-}
      BACKUP_DIR: /var/backups/gda
      UPLOAD_DIR: /var/uploads/gda
    volumes:
      - gda-backups:/var/backups/gda
      - gda-uploads:/var/uploads/gda
    networks:
      - gda

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: gda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - gda

networks:
  gda:
    driver: bridge

volumes:
  pgdata:
  gda-backups:
  gda-uploads:
