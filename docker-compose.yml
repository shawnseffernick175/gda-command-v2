version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gda
      POSTGRES_PASSWORD: gda_dev_password
      POSTGRES_DB: gda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gda -d gda"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-v3:
    build:
      context: .
      dockerfile: Dockerfile.v3
    container_name: gda-backend-v3
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://gda:gda_dev_password@postgres:5432/gda
      JWT_SECRET: dev-jwt-secret-change-in-production
      GDA_WEBHOOK_KEY: dev-webhook-key
      NODE_ENV: development
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
